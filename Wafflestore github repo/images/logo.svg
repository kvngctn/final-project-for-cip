<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Outer circle border -->
  <circle cx="150" cy="150" r="145" fill="none" stroke="#333" stroke-width="8"/>
  <circle cx="150" cy="150" r="138" fill="none" stroke="#999" stroke-width="2"/>
  
  <!-- Background -->
  <circle cx="150" cy="150" r="140" fill="white"/>
  
  <!-- Decorative top lines -->
  <line x1="60" y1="60" x2="110" y2="60" stroke="#333" stroke-width="3"/>
  <line x1="190" y1="60" x2="240" y2="60" stroke="#333" stroke-width="3"/>
  
  <!-- Main text: CENTRAL -->
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#000">
    CENTRAL
  </text>
  
  <!-- Decorative dot -->
  <circle cx="150" cy="130" r="5" fill="#e63946"/>
  
  <!-- Decorative side lines -->
  <line x1="80" y1="125" x2="120" y2="125" stroke="#e63946" stroke-width="2"/>
  <line x1="180" y1="125" x2="220" y2="125" stroke="#e63946" stroke-width="2"/>
  
  <!-- Subtext: Food Hub -->
  <text x="150" y="175" font-family="Georgia, serif" font-size="32" font-style="italic" text-anchor="middle" fill="#333">
    Food Hub
  </text>
  
  <!-- Decorative bottom lines -->
  <line x1="60" y1="240" x2="110" y2="240" stroke="#333" stroke-width="3"/>
  <line x1="190" y1="240" x2="240" y2="240" stroke="#333" stroke-width="3"/>
  
  <!-- Bottom center dot -->
  <circle cx="150" cy="250" r="3" fill="#e63946"/>
</svg>
